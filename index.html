<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SÁT HẠCH VẬN HÀNH MÁY NÂNG - CAEE</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body>

    <div id="start-screen">
        <div class="welcome-container">
            <div class="welcome-left">
                <div style="font-size: 50px; margin-bottom: 20px;">🚜</div>
                <h1>HỆ THỐNG SÁT HẠCH LÝ THUYẾT</h1>
                <p>Khoa Máy Thi Công - Trường CAEE</p>
                
                <div class="mode-selection">
                    <span class="mode-label">CHẾ ĐỘ:</span>
                    <label class="switch">
                        <input type="checkbox" id="modeToggle">
                        <span class="slider"></span>
                    </label>
                    <span class="mode-status" id="modeText">Thi sát hạch</span>
                </div>
            </div>

            <div class="welcome-right">
                <div class="login-card">
                    <h2>THÔNG TIN THÍ SINH</h2>
                    <div class="input-group">
                        <label>Họ và Tên:</label>
                        <input type="text" id="studentName" placeholder="Nhập họ tên có dấu...">
                    </div>
                    <div class="input-group">
                        <label>Lớp / Khóa:</label>
                        <input type="text" id="studentID" placeholder="Ví dụ: K57 - Máy nâng">
                    </div>
                    <button class="btn-start" onclick="startQuiz()">BẮT ĐẦU THI</button>
                </div>
                <div class="footer-welcome">© 2026 Khoa Máy thi công - CAEE</div>
            </div>
        </div>
    </div>

    <div class="caee-header" id="caee-header" style="display:none;">
        <div class="header-title">KHOA MÁY THI CÔNG - TRƯỜNG CAEE</div>
        <div class="header-info">
            <div id="header-student-info">Học viên: ...</div>
            <div class="timer-box" id="timer">20:00</div>
        </div>
    </div>

    <div id="quiz-screen" style="display:none;">
        <div class="quiz-container">
            <div id="quiz-content">
                </div>
            
            <div id="explanation-container"></div>
        </div>

        <div class="sidebar-right">
            <div class="question-grid-card">
                <div class="sidebar-title">SƠ ĐỒ CÂU HỎI</div>
                <div class="q-grid" id="nav-grid"></div>
            </div>

            <div class="status-legend-card">
                <div class="sidebar-title">CHÚ GIẢI</div>
                <div class="legend-item">
                    <span class="dot dot-green" style="background: #28a745;"></span>
                    <span>Đã trả lời</span>
                </div>
                <div class="legend-item">
                    <span class="dot dot-orange" style="background: #ff6600;"></span>
                    <span>Đang chọn</span>
                </div>
            </div>

            <button class="btn-submit" onclick="submitQuiz()">NỘP BÀI THI</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
